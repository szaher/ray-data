name: Quality Gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate content
        run: pnpm validate

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU-only PyTorch
        run: pip install 'torch==2.7.1+cpu' --index-url https://download.pytorch.org/whl/cpu

      - name: Run device-aware smoke test
        run: python scripts/test-device-aware.py --force-cpu

  module8-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ray Data
        run: pip install "ray[data]==2.55.1"

      - name: Run module-8 example smoke test
        run: python scripts/test-module8-examples.py

  content-scanners:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check GPU patterns
        run: pnpm check:gpu-patterns

      - name: Check deprecated concurrency
        run: pnpm check:deprecated-concurrency

      - name: Verify presentation artifacts are committed
        run: |
          cd presentations && bash build.sh
          git diff --exit-code -- presentations/dist/
